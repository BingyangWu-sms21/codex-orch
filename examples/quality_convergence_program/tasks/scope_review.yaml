id: scope_review
title: Summarize scope expansion decision
kind: work
agent: default
status: ready
depends_on:
  - task: acceptance_gate
    as: gate
    kind: context
    consume:
      - result.json
  - task: quality_attempt
    as: latest
    kind: context
    consume:
      - result.json
compose:
  - kind: file
    path: prompts/scope_review.md
  - kind: ref
    ref: deps.gate.result
  - kind: ref
    ref: deps.latest.result
publish:
  - final.md
