name: publish-pypi

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Verify tagged version matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as handle:
              payload = tomllib.load(handle)
          print(payload["project"]["version"])
          PY
          )"
          test "${TAG_VERSION}" = "${PACKAGE_VERSION}"

      - name: Build distributions
        run: uv build

      - name: Install pipx
        run: python -m pip install --upgrade pip pipx

      - name: Smoke test installed wheel
        run: |
          python -m pipx install dist/codex_orch-*.whl
          PIPX_BIN_DIR="$(python -m pipx environment --value PIPX_BIN_DIR)"
          "${PIPX_BIN_DIR}/codex-orch" --help
          "${PIPX_BIN_DIR}/codex-orch" --version

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish:
    needs: build-and-smoke
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
